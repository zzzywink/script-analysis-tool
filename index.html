<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频文案提取分析工具</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        brand: { 50: '#fff5f0', 100: '#ffe8e0', 500: '#FF8C52', 600: '#E87A3E', 700: '#D06930' }
      }
    }
  }
}
</script>
<style>
:root {
  --pink: #FF9AAE;
  --peach: #FFB89A;
  --orange: #FF8C52;
  --yellow: #FFD89B;
  --mint: #B8E8E0;
  --sky: #B5D8F7;
  --lavender: #D4C5F0;
  --text-dark: #5D4E4A;
  --text-mid: #8B7D79;
  --text-light: #B5A8A4;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Helvetica Neue', sans-serif;
  margin: 0;
  overflow-x: hidden;
  min-height: 100vh;
  color: var(--text-dark);
}

/* Macaron Gradient Background */
.bg-macaron {
  background: linear-gradient(170deg,
    #FFE8EC 0%,
    #FFEEE4 15%,
    #FFF5E3 30%,
    #FFF9ED 45%,
    #F5F9F0 60%,
    #EDF7F5 75%,
    #E8F4FD 90%,
    #EDF2FB 100%
  );
  background-attachment: fixed;
}

/* Glass Cards */
.glass-soft {
  background: rgba(255, 255, 255, 0.65);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.7);
  border-radius: 20px;
}
.glass-light {
  background: rgba(255, 255, 255, 0.5);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.6);
  border-radius: 20px;
}
.glass-nav {
  background: rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.65);
  border-radius: 24px;
}

/* Gradient Text */
.gradient-text {
  background: linear-gradient(135deg, var(--orange) 0%, var(--pink) 50%, var(--peach) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Section Badge */
.section-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 16px;
  border-radius: 999px;
  font-size: 13px; font-weight: 500;
  letter-spacing: 0.02em;
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.6);
  color: var(--text-mid);
}

/* Tag Pills */
.tag-pill {
  display: inline-flex; align-items: center;
  padding: 4px 12px;
  border-radius: 999px;
  font-size: 12px; font-weight: 500;
  letter-spacing: 0.01em;
}
.tag-pill-orange {
  background: rgba(255,140,82,0.12);
  color: #E87A3E;
  border: 1px solid rgba(255,140,82,0.25);
}
.tag-pill-pink {
  background: rgba(255,143,166,0.12);
  color: #E8708A;
  border: 1px solid rgba(255,143,166,0.25);
}
.tag-pill-mint {
  background: rgba(126,207,192,0.12);
  color: #5BA89A;
  border: 1px solid rgba(126,207,192,0.25);
}

/* Hover Lift */
.hover-lift {
  transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.35s ease;
}
.hover-lift:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 32px rgba(255,154,174,0.1);
}

/* Button Hover */
.btn-hover {
  transition: all 0.3s ease;
}
.btn-hover:hover {
  transform: scale(1.02) translateY(-2px);
  filter: brightness(1.06);
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}
.btn-hover:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
  filter: none;
  box-shadow: none;
}

/* Decorative Blobs */
.deco-circle {
  position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
}

/* Markdown Content Styles */
.markdown-body { line-height: 1.8; }
.markdown-body h1 { font-size: 1.5rem; font-weight: 700; margin: 1.5rem 0 1rem; color: var(--text-dark); border-bottom: 2px solid rgba(255,140,82,0.2); padding-bottom: 0.5rem; }
.markdown-body h2 { font-size: 1.25rem; font-weight: 600; margin: 1.25rem 0 0.75rem; color: var(--orange); }
.markdown-body h3 { font-size: 1.1rem; font-weight: 600; margin: 1rem 0 0.5rem; color: var(--text-mid); }
.markdown-body p { margin: 0.75rem 0; color: var(--text-dark); }
.markdown-body table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.875rem; border-radius: 12px; overflow: hidden; }
.markdown-body th { background: rgba(255,140,82,0.1); color: var(--text-dark); padding: 0.6rem 0.75rem; text-align: left; border: 1px solid rgba(255,140,82,0.15); font-weight: 600; }
.markdown-body td { padding: 0.5rem 0.75rem; border: 1px solid rgba(0,0,0,0.06); color: var(--text-dark); }
.markdown-body strong { color: var(--orange); font-weight: 600; }
.markdown-body ul, .markdown-body ol { margin: 0.5rem 0; padding-left: 1.5rem; color: var(--text-dark); }
.markdown-body li { margin: 0.25rem 0; }
.markdown-body code { background: rgba(255,140,82,0.08); padding: 0.125rem 0.375rem; border-radius: 0.25rem; font-size: 0.875rem; color: var(--orange); }
.markdown-body pre { background: rgba(0,0,0,0.03); padding: 1rem; border-radius: 0.75rem; overflow-x: auto; margin: 0.75rem 0; border: 1px solid rgba(0,0,0,0.06); }
.markdown-body pre code { background: none; padding: 0; color: var(--text-dark); }
.markdown-body hr { border: none; border-top: 1px solid rgba(0,0,0,0.06); margin: 1.5rem 0; }
.markdown-body blockquote { border-left: 3px solid var(--orange); padding-left: 1rem; margin: 0.75rem 0; color: var(--text-mid); }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }

/* Animations */
.fade-in { animation: fadeIn 0.35s ease-in; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.pulse { animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* Slide-in sidebar */
#historySidebar {
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}
#historyOverlay {
  transition: opacity 0.35s ease;
}

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  z-index: 100; padding: 10px 24px;
  border-radius: 999px;
  font-size: 14px; font-weight: 500;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 1.5s forwards;
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
@keyframes toastOut { from { opacity: 1; transform: translateX(-50%) translateY(0); } to { opacity: 0; transform: translateX(-50%) translateY(-10px); } }

/* Stage indicators */
.stage-dot.active { background: rgba(255,140,82,0.1); color: var(--orange); border-color: rgba(255,140,82,0.3); }
.stage-dot.done { background: rgba(126,207,192,0.1); color: #5BA89A; border-color: rgba(126,207,192,0.3); }
</style>
</head>
<body class="bg-macaron relative">

<!-- Decorative Background -->
<div class="deco-circle" style="width:380px;height:380px;background:radial-gradient(circle,rgba(255,154,174,0.08),transparent 70%);top:-60px;right:-80px;"></div>
<div class="deco-circle" style="width:300px;height:300px;background:radial-gradient(circle,rgba(255,216,155,0.1),transparent 70%);bottom:10%;left:-60px;"></div>
<div class="deco-circle" style="width:260px;height:260px;background:radial-gradient(circle,rgba(184,232,224,0.08),transparent 70%);top:50%;right:-40px;"></div>

<!-- History Sidebar Overlay -->
<div id="historyOverlay" class="fixed inset-0 z-40 hidden" style="background:rgba(80,70,70,0.15);backdrop-filter:blur(4px);" onclick="closeHistory()"></div>

<!-- History Sidebar -->
<aside id="historySidebar" class="fixed left-0 top-0 h-full w-80 z-50 glass-soft overflow-hidden flex flex-col" style="border-radius:0 20px 20px 0;transform:translateX(-100%);">
  <div class="p-5 flex items-center justify-between border-b" style="border-color:rgba(0,0,0,0.05);">
    <h2 class="text-lg font-semibold flex items-center gap-2" style="color:var(--text-dark);">
      <i data-lucide="history" class="w-5 h-5" style="color:var(--orange);"></i> 历史记录
    </h2>
    <button onclick="closeHistory()" class="p-1.5 rounded-lg hover:bg-black/5 transition-colors">
      <i data-lucide="x" class="w-4 h-4" style="color:var(--text-mid);"></i>
    </button>
  </div>
  <div id="historyList" class="flex-1 overflow-y-auto p-3 space-y-2">
    <div class="flex flex-col items-center justify-center py-16" style="color:var(--text-light);">
      <i data-lucide="inbox" class="w-10 h-10 mb-3 opacity-40"></i>
      <p class="text-sm">暂无历史记录</p>
      <p class="text-xs mt-1">分析完成后自动保存</p>
    </div>
  </div>
</aside>

<!-- Header -->
<header class="relative z-30 sticky top-3 mx-auto w-[95%] max-w-5xl">
  <nav class="glass-nav px-5 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <button onclick="openHistory()" class="p-2 rounded-xl hover:bg-white/50 transition-colors" title="历史记录">
        <i data-lucide="history" class="w-5 h-5" style="color:var(--orange);"></i>
      </button>
      <h1 class="text-lg font-semibold">
        <span class="gradient-text">视频文案分析</span>
      </h1>
    </div>
    <div id="statusBadge" class="flex items-center gap-2 px-3 py-1.5 rounded-full text-sm" style="background:rgba(255,255,255,0.5);color:var(--text-mid);">
      <span class="w-2 h-2 rounded-full" style="background:var(--mint);"></span>
      <span>就绪</span>
    </div>
  </nav>
</header>

<main class="relative z-10 max-w-5xl mx-auto px-4 py-6 space-y-6">

  <!-- Input Section -->
  <section class="glass-soft p-6 hover-lift fade-in">
    <div class="space-y-4">
      <div class="flex flex-col sm:flex-row gap-3">
        <div class="flex-1 relative">
          <i data-lucide="link" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4" style="color:var(--text-light);"></i>
          <input id="urlInput" type="url" placeholder="粘贴视频链接（B站 / YouTube / 抖音）..."
            class="w-full pl-10 pr-4 py-3 rounded-xl text-sm transition-all duration-300"
            style="background:rgba(255,255,255,0.6);border:1px solid rgba(0,0,0,0.06);color:var(--text-dark);outline:none;"
            onfocus="this.style.borderColor='rgba(255,140,82,0.4)';this.style.boxShadow='0 0 0 3px rgba(255,140,82,0.08)';"
            onblur="this.style.borderColor='rgba(0,0,0,0.06)';this.style.boxShadow='none';">
        </div>
        <button id="analyzeBtn" onclick="startAnalysis()"
          class="btn-hover px-6 py-3 text-white text-sm font-medium rounded-xl flex items-center gap-2 whitespace-nowrap"
          style="background:var(--orange);">
          <i data-lucide="play" class="w-4 h-4"></i> 开始分析
        </button>
      </div>
      <div>
        <button onclick="toggleApiKey()" class="text-sm flex items-center gap-1 hover:opacity-70 transition-opacity" style="color:var(--text-mid);">
          <i id="apiKeyCaret" data-lucide="chevron-right" class="w-3.5 h-3.5 transition-transform"></i>
          DeepSeek API Key <span style="color:var(--text-light);">（可选）</span>
        </button>
        <div id="apiKeyRow" class="mt-2 hidden">
          <input id="apiKeyInput" type="password" placeholder="sk-..."
            class="w-full max-w-md px-4 py-2 rounded-xl text-sm"
            style="background:rgba(255,255,255,0.6);border:1px solid rgba(0,0,0,0.06);color:var(--text-dark);outline:none;"
            onfocus="this.style.borderColor='rgba(255,140,82,0.4)';this.style.boxShadow='0 0 0 3px rgba(255,140,82,0.08)';"
            onblur="this.style.borderColor='rgba(0,0,0,0.06)';this.style.boxShadow='none';">
          <p class="text-xs mt-1" style="color:var(--text-light);">留空则使用服务器环境变量中的 DEEPSEEK_API_KEY</p>
        </div>
      </div>
    </div>
  </section>

  <!-- Progress Section -->
  <section id="progressSection" class="glass-soft p-6 hidden fade-in">
    <div class="flex items-center justify-between mb-3">
      <span id="progressLabel" class="text-sm" style="color:var(--text-mid);">准备中...</span>
      <span id="progressPercent" class="text-sm font-mono font-medium" style="color:var(--orange);">0%</span>
    </div>
    <div class="w-full h-2 rounded-full overflow-hidden" style="background:rgba(0,0,0,0.04);">
      <div id="progressBar" class="h-full rounded-full transition-all duration-500" style="width:0%;background:linear-gradient(90deg,var(--peach),var(--orange),var(--pink));"></div>
    </div>
    <!-- Stage Indicators -->
    <div id="stageIndicators" class="flex flex-wrap items-center gap-2 mt-4">
      <div data-stage="1" class="stage-dot flex items-center gap-1.5 text-xs px-2.5 py-1 rounded-full" style="background:rgba(0,0,0,0.03);color:var(--text-light);border:1px solid transparent;">
        <span class="w-1.5 h-1.5 rounded-full" style="background:var(--text-light);"></span> 下载
      </div>
      <span class="text-xs" style="color:var(--text-light);">→</span>
      <div data-stage="2" class="stage-dot flex items-center gap-1.5 text-xs px-2.5 py-1 rounded-full" style="background:rgba(0,0,0,0.03);color:var(--text-light);border:1px solid transparent;">
        <span class="w-1.5 h-1.5 rounded-full" style="background:var(--text-light);"></span> 字幕
      </div>
      <span class="text-xs" style="color:var(--text-light);">→</span>
      <div data-stage="3" class="stage-dot flex items-center gap-1.5 text-xs px-2.5 py-1 rounded-full" style="background:rgba(0,0,0,0.03);color:var(--text-light);border:1px solid transparent;">
        <span class="w-1.5 h-1.5 rounded-full" style="background:var(--text-light);"></span> 校正
      </div>
      <span class="text-xs" style="color:var(--text-light);">→</span>
      <div data-stage="4" class="stage-dot flex items-center gap-1.5 text-xs px-2.5 py-1 rounded-full" style="background:rgba(0,0,0,0.03);color:var(--text-light);border:1px solid transparent;">
        <span class="w-1.5 h-1.5 rounded-full" style="background:var(--text-light);"></span> 分析
      </div>
      <span class="text-xs" style="color:var(--text-light);">→</span>
      <div data-stage="5" class="stage-dot flex items-center gap-1.5 text-xs px-2.5 py-1 rounded-full" style="background:rgba(0,0,0,0.03);color:var(--text-light);border:1px solid transparent;">
        <span class="w-1.5 h-1.5 rounded-full" style="background:var(--text-light);"></span> 结构化
      </div>
    </div>
    <p id="stageMessage" class="text-sm mt-3" style="color:var(--text-light);"></p>
  </section>

  <!-- Error Section -->
  <section id="errorSection" class="p-4 rounded-xl hidden fade-in" style="background:rgba(255,154,174,0.1);border:1px solid rgba(255,154,174,0.25);">
    <div class="flex items-start gap-3">
      <i data-lucide="alert-circle" class="w-5 h-5 mt-0.5 flex-shrink-0" style="color:var(--pink);"></i>
      <div class="flex-1">
        <h3 class="font-medium" style="color:#E8708A;">分析过程中出现错误</h3>
        <p id="errorMessage" class="text-sm mt-1" style="color:rgba(232,112,138,0.7);"></p>
      </div>
      <button onclick="dismissError()" class="hover:opacity-70 transition-opacity">
        <i data-lucide="x" class="w-4 h-4" style="color:var(--pink);"></i>
      </button>
    </div>
  </section>

  <!-- Results Section -->
  <section id="resultsSection" class="glass-soft overflow-hidden fade-in">
    <!-- Tab Bar -->
    <div class="flex items-center border-b" style="border-color:rgba(0,0,0,0.05);">
      <div id="tabBar" class="flex overflow-x-auto flex-1">
        <button data-tab="text" class="tab-btn px-4 py-3 text-sm font-medium whitespace-nowrap border-b-2 transition-colors" style="border-color:transparent;color:var(--text-light);">
          <i data-lucide="file-text" class="w-3.5 h-3.5 inline mr-1.5"></i> 文字稿
        </button>
        <button data-tab="analysis" class="tab-btn px-4 py-3 text-sm font-medium whitespace-nowrap border-b-2 transition-colors" style="border-color:transparent;color:var(--text-light);">
          <i data-lucide="bar-chart-2" class="w-3.5 h-3.5 inline mr-1.5"></i> 分析报告
        </button>
        <button data-tab="structured" class="tab-btn px-4 py-3 text-sm font-medium whitespace-nowrap border-b-2 transition-colors" style="border-color:transparent;color:var(--text-light);">
          <i data-lucide="list" class="w-3.5 h-3.5 inline mr-1.5"></i> 结构化文字稿
        </button>
      </div>
      <!-- Copy Button -->
      <button id="copyBtn" onclick="copyContent()" class="btn-hover px-4 py-2 mr-3 text-xs font-medium rounded-xl flex items-center gap-1.5"
        style="background:rgba(255,140,82,0.08);color:var(--orange);border:1px solid rgba(255,140,82,0.15);">
        <i data-lucide="copy" class="w-3.5 h-3.5"></i> 复制
      </button>
    </div>
    <!-- Tab Content -->
    <div id="tabContent" class="p-6 markdown-body min-h-[300px]">
      <div class="flex flex-col items-center justify-center py-16" style="color:var(--text-light);">
        <i data-lucide="video" class="w-12 h-12 mb-4 opacity-30"></i>
        <p class="text-lg">输入视频链接，开始分析</p>
        <p class="text-sm mt-2">支持 B站、YouTube、抖音等平台</p>
      </div>
    </div>
  </section>

</main>

<script>
// ============================================================
// State
// ============================================================
const state = {
  running: false,
  currentRecordId: null,
  contents: { text: '', analysis: '', structured: '' },
  activeTab: 'text'
};

// ============================================================
// UI Helpers
// ============================================================
function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }

function toggleApiKey() {
  const row = $('#apiKeyRow');
  const caret = $('#apiKeyCaret');
  row.classList.toggle('hidden');
  caret.style.transform = row.classList.contains('hidden') ? '' : 'rotate(90deg)';
}

function dismissError() {
  $('#errorSection').classList.add('hidden');
}

function showError(msg) {
  $('#errorMessage').textContent = msg;
  $('#errorSection').classList.remove('hidden');
  $('#errorSection').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.style.cssText = 'background:rgba(255,255,255,0.9);color:var(--text-dark);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.8);box-shadow:0 4px 20px rgba(0,0,0,0.08);';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2000);
}

function setStatus(status, dotColor, textColor) {
  const badge = $('#statusBadge');
  const dot = badge.querySelector('span:first-child');
  const label = badge.querySelector('span:last-child');
  dot.style.background = dotColor || 'var(--mint)';
  if (textColor) label.style.color = textColor;
  label.textContent = status;
}

// ============================================================
// History Panel
// ============================================================
function openHistory() {
  $('#historySidebar').style.transform = 'translateX(0)';
  $('#historyOverlay').classList.remove('hidden');
  $('#historyOverlay').style.opacity = '1';
  loadHistoryList();
}

function closeHistory() {
  $('#historySidebar').style.transform = 'translateX(-100%)';
  $('#historyOverlay').style.opacity = '0';
  setTimeout(() => $('#historyOverlay').classList.add('hidden'), 350);
}

async function loadHistoryList() {
  try {
    const res = await fetch('/api/history');
    const records = await res.json();
    const container = $('#historyList');

    if (!records.length) {
      container.innerHTML = `<div class="flex flex-col items-center justify-center py-16" style="color:var(--text-light);">
        <i data-lucide="inbox" class="w-10 h-10 mb-3 opacity-40"></i>
        <p class="text-sm">暂无历史记录</p>
        <p class="text-xs mt-1">分析完成后自动保存</p>
      </div>`;
      safeCreateIcons();
      return;
    }

    const now = new Date();
    container.innerHTML = records.map((r, i) => {
      const dt = new Date(r.created_at);
      const timeAgo = formatTimeAgo(dt, now);
      const stageLabels = [];
      if (r.has_text) stageLabels.push('<span class="tag-pill tag-pill-orange">文字稿</span>');
      if (r.has_analysis) stageLabels.push('<span class="tag-pill tag-pill-pink">分析</span>');
      if (r.has_structured) stageLabels.push('<span class="tag-pill tag-pill-mint">结构化</span>');

      return `
        <div class="group p-3 rounded-xl cursor-pointer transition-all duration-200 hover:bg-white/40 border border-transparent hover:border-black/5"
          onclick="loadHistoryRecord('${r.id}')">
          <div class="flex items-start justify-between">
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium truncate" style="color:var(--text-dark);">${escapeHtml(r.title)}</p>
              <p class="text-xs mt-1" style="color:var(--text-light);">${timeAgo}</p>
              <div class="flex flex-wrap gap-1.5 mt-2">${stageLabels.join('')}</div>
            </div>
            <button onclick="event.stopPropagation();deleteHistory('${r.id}')"
              class="opacity-0 group-hover:opacity-100 p-1.5 rounded-lg hover:bg-red-50 transition-all"
              title="删除">
              <i data-lucide="trash-2" class="w-3.5 h-3.5" style="color:var(--pink);"></i>
            </button>
          </div>
        </div>`;
    }).join('');

    safeCreateIcons();
  } catch (e) {
    console.error('加载历史记录失败:', e);
  }
}

async function loadHistoryRecord(id) {
  try {
    const res = await fetch(`/api/history/${id}`);
    const record = await res.json();
    const stages = record.stages || {};

    state.contents = {
      text: stages.text || '',
      analysis: stages.analysis || '',
      structured: stages.structured || ''
    };
    state.currentRecordId = id;

    // Update URL input
    if (record.video_url) {
      $('#urlInput').value = record.video_url;
    }

    // Show results section and switch to first available tab
    if (state.contents.text || state.contents.analysis || state.contents.structured) {
      if (state.contents.text) switchTab('text');
      else if (state.contents.analysis) switchTab('analysis');
      else switchTab('structured');
    }

    closeHistory();
    showToast('已加载历史记录');
  } catch (e) {
    console.error('加载记录详情失败:', e);
    showToast('加载失败');
  }
}

async function deleteHistory(id) {
  try {
    await fetch(`/api/history/${id}`, { method: 'DELETE' });
    if (state.currentRecordId === id) {
      state.currentRecordId = null;
    }
    loadHistoryList();
    showToast('已删除');
  } catch (e) {
    console.error('删除失败:', e);
  }
}

function formatTimeAgo(dt, now) {
  const diff = Math.floor((now - dt) / 1000);
  if (diff < 60) return '刚刚';
  if (diff < 3600) return `${Math.floor(diff / 60)} 分钟前`;
  if (diff < 86400) return `${Math.floor(diff / 3600)} 小时前`;
  if (diff < 604800) return `${Math.floor(diff / 86400)} 天前`;
  return dt.toLocaleDateString('zh-CN');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ============================================================
// Copy
// ============================================================
function copyContent() {
  const content = state.contents[state.activeTab];
  if (!content) {
    showToast('暂无内容可复制');
    return;
  }
  navigator.clipboard.writeText(content).then(() => {
    const btn = $('#copyBtn');
    const orig = btn.innerHTML;
    btn.innerHTML = '<i data-lucide="check" class="w-3.5 h-3.5"></i> 已复制';
    btn.style.background = 'rgba(126,207,192,0.15)';
    btn.style.color = '#5BA89A';
    btn.style.borderColor = 'rgba(126,207,192,0.3)';
    safeCreateIcons();
    setTimeout(() => {
      btn.innerHTML = orig;
      btn.style.background = 'rgba(255,140,82,0.08)';
      btn.style.color = 'var(--orange)';
      btn.style.borderColor = 'rgba(255,140,82,0.15)';
      safeCreateIcons();
    }, 1800);
  }).catch(() => showToast('复制失败，请手动复制'));
}

// ============================================================
// Tab System
// ============================================================
$$('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

function switchTab(tab) {
  state.activeTab = tab;
  $$('.tab-btn').forEach(b => {
    if (b.dataset.tab === tab) {
      b.style.borderColor = 'var(--orange)';
      b.style.color = 'var(--orange)';
    } else {
      b.style.borderColor = 'transparent';
      b.style.color = 'var(--text-light)';
    }
  });
  renderContent();
}

function renderContent() {
  const content = state.contents[state.activeTab];
  const container = $('#tabContent');
  if (content) {
    container.innerHTML = marked.parse(content);
  } else {
    container.innerHTML = `<div class="flex flex-col items-center justify-center py-16" style="color:var(--text-light);">
      <i data-lucide="hourglass" class="w-10 h-10 mb-3 opacity-40 pulse"></i>
      <p>等待分析完成...</p>
    </div>`;
    safeCreateIcons();
  }
}

function updateTabContent(tab, content) {
  state.contents[tab] = content;
  const hasAnyContent = Object.values(state.contents).some(c => c);
  if (hasAnyContent && !state.contents[state.activeTab]) {
    switchTab(tab);
  }
  if (state.activeTab === tab) {
    renderContent();
  }
}

// ============================================================
// Progress
// ============================================================
function updateProgress(pct, label, message) {
  $('#progressBar').style.width = pct + '%';
  $('#progressPercent').textContent = pct + '%';
  if (label) $('#progressLabel').textContent = label;
  if (message) $('#stageMessage').textContent = message;
}

function updateStageIndicator(stage, status) {
  const dots = $$('.stage-dot');
  dots.forEach(d => {
    const s = parseInt(d.dataset.stage);
    const dot = d.querySelector('span:first-child');
    if (s === stage && status === 'running') {
      d.className = 'stage-dot active flex items-center gap-1.5 text-xs px-2.5 py-1 rounded-full';
      d.style.background = 'rgba(255,140,82,0.1)';
      d.style.color = 'var(--orange)';
      d.style.borderColor = 'rgba(255,140,82,0.3)';
      dot.className = 'w-1.5 h-1.5 rounded-full pulse';
      dot.style.background = 'var(--orange)';
    } else if (status === 'done' || s < stage) {
      d.className = 'stage-dot done flex items-center gap-1.5 text-xs px-2.5 py-1 rounded-full';
      d.style.background = 'rgba(126,207,192,0.1)';
      d.style.color = '#5BA89A';
      d.style.borderColor = 'rgba(126,207,192,0.3)';
      dot.className = 'w-1.5 h-1.5 rounded-full';
      dot.style.background = '#5BA89A';
    }
  });
}

// ============================================================
// SSE Client
// ============================================================
async function startAnalysis() {
  const url = $('#urlInput').value.trim();
  if (!url) {
    showError('请输入视频链接');
    return;
  }

  if (state.running) return;
  state.running = true;

  // Reset state
  state.contents = { text: '', analysis: '', structured: '' };
  state.currentRecordId = null;
  $('#analyzeBtn').disabled = true;
  $('#urlInput').disabled = true;
  $('#progressSection').classList.remove('hidden');
  $('#errorSection').classList.add('hidden');
  $('#tabContent').innerHTML = `<div class="flex flex-col items-center justify-center py-16" style="color:var(--text-light);">
    <i data-lucide="loader" class="w-10 h-10 mb-4 opacity-40" style="animation:spin 1.5s linear infinite;"></i>
    <p>正在启动分析...</p>
  </div>`;
  updateProgress(0, '启动中...', '');
  setStatus('分析中', 'var(--orange)', 'var(--orange)');
  $$('.stage-dot').forEach(d => {
    d.className = 'stage-dot flex items-center gap-1.5 text-xs px-2.5 py-1 rounded-full';
    d.style.background = 'rgba(0,0,0,0.03)';
    d.style.color = 'var(--text-light)';
    d.style.borderColor = 'transparent';
    d.querySelector('span:first-child').className = 'w-1.5 h-1.5 rounded-full';
    d.querySelector('span:first-child').style.background = 'var(--text-light)';
  });
  safeCreateIcons();

  try {
    const apiKey = $('#apiKeyInput').value.trim();

    const response = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ video_url: url, deepseek_api_key: apiKey })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.detail || `HTTP ${response.status}`);
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const parts = buffer.split('\n\n');
      buffer = parts.pop();

      for (const part of parts) {
        if (!part.trim()) continue;
        const lines = part.split('\n');
        let eventType = 'message';
        let dataStr = '';
        for (const line of lines) {
          if (line.startsWith('event: ')) eventType = line.slice(7).trim();
          else if (line.startsWith('data: ')) dataStr = line.slice(6);
        }
        if (!dataStr) continue;

        try {
          const data = JSON.parse(dataStr);
          handleSSEEvent(eventType, data);
        } catch (e) {
          console.warn('SSE parse error:', e, dataStr);
        }
      }
    }
  } catch (err) {
    console.error('Analysis error:', err);
    showError(err.message || '连接失败，请检查后端服务是否运行');
    setStatus('错误', 'var(--pink)', '#E8708A');
  } finally {
    state.running = false;
    $('#analyzeBtn').disabled = false;
    $('#urlInput').disabled = false;
    safeCreateIcons();
  }
}

function handleSSEEvent(type, data) {
  switch (type) {
    case 'record_created':
      state.currentRecordId = data.record_id;
      break;

    case 'progress':
      updateProgress(data.progress_pct, `${data.stage_name} — ${data.status === 'done' ? '完成' : '进行中'}`, data.message);
      updateStageIndicator(data.stage, data.status);
      if (data.stage >= 3 && data.status === 'running') {
        setStatus(`阶段 ${data.stage}: ${data.stage_name}`, 'var(--orange)', 'var(--orange)');
      }
      break;

    case 'stage_result':
      updateProgress(data.stage === 5 ? 100 : data.stage * 20, `${data.stage_name} 完成`, '');
      updateStageIndicator(data.stage, 'done');
      const tabMap = { 3: 'text', 4: 'analysis', 5: 'structured' };
      const tab = tabMap[data.stage];
      if (tab && data.content) {
        updateTabContent(tab, data.content);
      }
      break;

    case 'complete':
      updateProgress(100, '全部完成！', '');
      setStatus('完成', 'var(--mint)', '#5BA89A');
      if (state.contents.text) switchTab('text');
      showToast('分析完成，结果已保存');
      break;

    case 'error':
      console.error('Stage error:', data);
      showError(`阶段 ${data.stage}: ${data.message}`);
      setStatus('错误', 'var(--pink)', '#E8708A');
      break;
  }
}

// ============================================================
// Init
// ============================================================
function safeCreateIcons() {
  try {
    if (typeof lucide !== 'undefined' && lucide.createIcons) {
      lucide.createIcons();
    }
  } catch (e) {
    // lucide 加载失败，页面仍可正常使用
  }
}

fetch('/api/health')
  .then(r => r.json())
  .then(d => {
    console.log('Backend:', d.status);
    $('#statusBadge').querySelector('span:last-child').textContent = '就绪';
  })
  .catch(() => {
    console.warn('后端服务未运行，请先启动服务');
    const badge = $('#statusBadge');
    badge.querySelector('span:first-child').style.background = 'var(--pink)';
    badge.querySelector('span:last-child').textContent = '后端未连接';
    badge.querySelector('span:last-child').style.color = '#E8708A';
  });

// Add spin animation
const spinStyle = document.createElement('style');
spinStyle.textContent = '@keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }';
document.head.appendChild(spinStyle);

// Initialize Lucide icons on load
safeCreateIcons();
</script>
